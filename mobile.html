<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a" id="themeColorMeta">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="dark-theme">

    <main id="mobile-root">      
        <div style="display: none;">
            <input type="text" id="settingsDbUrlInput">
            <input type="password" id="settingsApiKeyInput">
            <input type="text" id="taskInput">
            <select id="viewSelect"></select>
            <select id="projectFilter"></select>
        </div>
        <header style="padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 10px; background: var(--bg-main);">
        <header style="padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; gap: 10px; background: var(--bg-main);">
            <input type="text" id="mobileTaskInput" placeholder="Añadir nueva tarea..." style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-main);">
            <button onclick="window.addMobileTask()" style="background: var(--accent-color); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer;">+</button>
        </header>

        <div id="mobileTaskList" class="task-list" style="padding: 15px; padding-bottom: 100px;">
            <div style="text-align: center; color: var(--text-secondary); padding: 40px 0;">Cargando motor de tareas...</div>
        </div>

        <div id="viewMenuModal" class="modal-fullscreen hidden">
            <div class="modal-header">
                <h2>Filtros y Vistas</h2>
                <button class="btn-close" onclick="window.toggleViewMenu()">X</button>
            </div>
            <div class="modal-content" id="modalDynamicContent">
                </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="window.toggleViewMenu()">
                <span style="font-size: 20px;">📅</span>
                <span>Vistas</span>
            </button>
            
            <button class="nav-btn" onclick="window.toggleSettingsMenu()">
                <span style="font-size: 20px;">🌗</span>
                <span>Tema</span>
            </button>
        </nav>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Este gatillo garantiza que renderTasks se dispare aunque app.js se demore
            setTimeout(() => {
                if(window.renderTasks) window.renderTasks();
            }, 800);
        });
    </script>

<script src="js/config.js"></script>
    <script src="js/cloud.js"></script>
    <script src="js/model.js"></script>
    <script src="js/engine.js"></script>

    <script>
        window.initSpeechRecognition = function() {};
        window.updateDateDisplay = function() {};
        window.showSyncStatus = function(status) {};
        window.showNotice = function(mensaje) {};
        window.refreshAllDropdowns = function() {};
        window.renderCalendar = function() {};
    </script>

    <script src="js/app.js"></script>

    <script src="js/ui-mobile.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { if(window.renderTasks) window.renderTasks(); }, 800);
        });
    </script>
</body>
</html>

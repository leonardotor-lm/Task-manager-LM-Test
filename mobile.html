<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tareas - MVP Móvil</title>
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <main id="mobile-root">
        <div style="margin-bottom: 16px;">
            <select id="mobileViewSelector" onchange="window.changeMobileView(this.value)" style="width: 100%; padding: 12px; background-color: #1D313C; color: #f8fafc; border: 1px solid #4A5B6D; border-radius: 6px; font-size: 16px; outline: none;">
                <option value="today">Hoy y atrasadas</option>
                <option value="tomorrow">Mañana</option>
                <option value="week">Esta semana</option>
                <option value="all">Todas las tareas</option>
            </select>
        </div>

        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" id="mobileTaskInput" placeholder="Nueva tarea..." style="flex: 1; padding: 12px; background-color: #1D313C; color: #f8fafc; border: 1px solid #4A5B6D; border-radius: 6px; font-size: 16px; outline: none;">
            <button onclick="window.addMobileTask()" style="background-color: #F6723A; color: #0A1318; border: none; padding: 0 16px; border-radius: 6px; font-weight: bold; font-size: 20px; cursor: pointer;">+</button>
        </div>

        <div id="mobileTaskList"></div>
    </main>
    
    <div style="display: none;">
        <input type="hidden" id="settingsDbUrlInput">
        <input type="hidden" id="settingsApiKeyInput">
    </div>

    <script src="js/config.js"></script>
    <script src="js/cloud.js"></script>
    <script src="js/model.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/ui-mobile.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

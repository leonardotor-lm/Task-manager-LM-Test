<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a" id="themeColorMeta">
    <title>Tareas - MVP Móvil</title>
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <main id="mobile-root">
        <div class="sticky-header">
            <div class="control-group flex-row">
                <select id="mobileViewSelector" class="input-base" onchange="window.changeMobileView(this.value)">
                    <option value="today">Hoy y atrasadas</option>
                    <option value="tomorrow">Mañana</option>
                    <option value="week">Esta semana</option>
                    <option value="all">Todas las tareas</option>
                </select>
                <button onclick="window.toggleTheme()" class="input-base" style="width: auto; font-weight: bold;">Tema</button>
            </div>
            <div class="control-group flex-row">
                <input type="text" id="mobileTaskInput" class="input-base" placeholder="Nueva tarea rápida...">
                <button onclick="window.addMobileTask()" class="btn-add">+</button>
            </div>
        </div>

        <div id="mobileTaskList" class="task-list"></div>
    </main>    
    <div style="display: none;">
        <input type="hidden" id="settingsDbUrlInput">
        <input type="hidden" id="settingsApiKeyInput">
    </div>

    <script src="js/config.js"></script>
    <script src="js/cloud.js"></script>
    <script src="js/model.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/ui-mobile.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker registrado con éxito:', registration.scope);
                })
                .catch(error => {
                    console.log('Fallo en el registro del ServiceWorker:', error);
                });
            });
        }
    </script>
</body>
</html>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a" id="themeColorMeta">
    <title>Tareas - MVP Móvil</title>
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <main id="mobile-root">
        <nav class="bottom-nav">
        <button class="nav-btn" onclick="window.toggleViewMenu()">
            <span class="nav-icon">📅</span>
            <span class="nav-label">Vistas</span>
        </button>
        
        <button class="nav-btn btn-primary-nav" onclick="window.addMobileTask()">
            <span class="nav-icon">+</span>
        </button>
        
        <button class="nav-btn" onclick="window.toggleSettingsMenu()">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Ajustes</span>
        </button>
    </nav>
        <div class="control-group flex-row">
                <input type="text" id="mobileTaskInput" class="input-base" placeholder="Nueva tarea rápida...">
                <button onclick="window.addMobileTask()" class="btn-add">+</button>
            </div>
        </div>

        <div id="mobileTaskList" class="task-list"></div>
    </main>    
    <div style="display: none;">
        <input type="hidden" id="settingsDbUrlInput">
        <input type="hidden" id="settingsApiKeyInput">
    </div>

    <script src="js/config.js"></script>
    <script src="js/cloud.js"></script>
    <script src="js/model.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/ui-mobile.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('ServiceWorker registrado con éxito:', registration.scope);
                })
                .catch(error => {
                    console.log('Fallo en el registro del ServiceWorker:', error);
                });
            });
        }
    </script>
</body>
</html>
</body>
</html>
